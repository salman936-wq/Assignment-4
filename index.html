<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>


    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        section,
        hr {
            max-width: 1110px;
            margin: 0 auto;
        }
    </style>


</head>


<body class="bg-[#F8FAFC] min-h-screen">

    <!-- 
    ID list
    Total count = total-count
    Interview count = interview-count
    Rejected count = rejected-count
    all tabs div id = all-tabs
    Tabs all content = tabs-all-content
    Tabs Interview Content if interview 0 = tabs-interview-content
    Tabs rejected content if rejectd 0 = tabs-rejected-content
    Id for interview button = interview
    id for rejected button = rejected
    -->

    <section class="py-8">
        <h1 class="text-[#002C5C] font-bold text-[32px] leading-8 pb-5">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4">
            <div class="p-5 flex flex-col gap-3 bg-white shadow rounded-lg">
                <h3 class="font-medium text-[14px] text-[#323B49]">Total</h3>
                <h4 id="total-count" class="text-[#002C5C] text-[24px] font-bold">0</h4>
            </div>
            <div class="p-5 flex flex-col gap-3 bg-white shadow rounded-lg">
                <h3 class="font-medium text-[14px] text-[#323B49]">Interview</h3>
                <h4 id="interview-count" class="text-[#10B981] text-[24px] font-bold">0</h4>
            </div>
            <div class="p-5 flex flex-col gap-3 bg-white shadow rounded-lg">
                <h3 class="font-medium text-[14px] text-[#323B49]">Rejected</h3>
                <h4 id="rejected-count" class="text-[#EF4444] text-[24px] font-bold">0</h4>
            </div>
        </div>
    </section>

    <hr class="text-[#E6E7E9]">

    <section class="py-6 grid-cols-1 grid gap-4">

        <h3 class="text-[#002C5C] font-semibold text-[20px] ">Available Jobs</h3>
        <!-- name of each tab group should be unique -->

        <div id="all-tabs" class="tabs tabs-box p-0 bg-transparent border-none gap-2 flex">



            <input type="radio" name="my_tabs_6"
                class="tab  bg-white w-20 shadow checked:bg-[#3B82F6] checked:text-white" aria-label="All"
                checked="checked" />

            <div id="tabs-all-content" class="tab-content">
            </div>



            <input type="radio" name="my_tabs_6"
                class="tab shadow w-20 bg-white checked:bg-[#3B82F6] checked:text-white" aria-label="Interview" />
            <div id="tabs-interview-content" class="tab-content">
            </div>

            <input type="radio" name="my_tabs_6"
                class="tab w-20 shadow bg-white checked:bg-[#3B82F6] checked:text-white" aria-label="Rejected" />
            <div id="tabs-rejected-content" class="tab-content">
                
            </div>
        
        </div>
    
    </section>





<script src="script.js"></script>

</body>



</html>
